template:
  pipeline:
    stages:
      - name: SerialStageGroup
        id: SerialStageGroup
        group:
          stages:
            - name: stageGroup
              id: stageGroup
              group:
                stages:
                  - name: buildAndTestStage_1
                    id: buildAndTestStage_1
                    steps:
                      - name: runBuild
                        run: mvn -B clean package -DskipTests
                        id: runBuild
                      - name: runTests
                        run-test:
                          script: mvn test
                          intelligence:
                            disabled: false
                        id: runTests
      - name: RegularSTage
        id: RegularSTage
        steps:
          - name: run
            run: echo "hi"
            id: run
